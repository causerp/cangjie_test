[dependencies]

[package]
  cjc-version = "1.0.0"
  compile-option = ""
  description = "nothing here"
  link-option = ""
  name = "b"
  output-type = "dynamic"
  override-compile-option = ""
  src-dir = "src"
  target-dir = ""
  version = "1.0.0"
  package-configuration = {}

[target.aarch64-linux-android]
  override-compile-option = "--sysroot /opt/buildtools/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/sysroot -L /opt/buildtools/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/17/lib/linux"

[profile]
  build = { incremental = true, lto = "full", combined = { b = "dynamic" }}

[package.package-configuration.b]
  combine-all-deps = true