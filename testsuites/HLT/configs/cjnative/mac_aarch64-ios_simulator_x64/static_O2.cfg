[description]
	title = aarch64-apple-darwin->x86_64-apple-ios17.5-simulator,O2,all_statically_linked
[root]
	path = ../../../
[suffix]
	cj = //
	info = //
[run]
	script = bash ${CANGJIE_TEST}/testsuites/HLT/configs/cjnative/ios/run_ios_simulator.sh | ignore_cmd_redirect
	pass_redirect = true
[env]
	LD_LIBRARY_PATH=./:$LD_LIBRARY_PATH
[condition]
	condition =
		cross_compilation
		host_mac
		arm
		host_aarch64
		MAC
		target_ios_simulator
		x86
		target_x86_64
		iOS
		O2
		CJNATIVE
[internal-var]
	cangjie_test = $CANGJIE_TEST
	compiler = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_HOME/runtime/lib/darwin_aarch64_cjnative:$CANGJIE_HOME/tools/lib:$DYLD_LIBRARY_PATH && cjc --import-path ${CANGJIE_LOCAL_STDX_PATH} 
	compiler_frontend = cjc-frontend
	cmp_opt = $(%%python $CANGJIE_TEST/testsuites/HLT/configs/cjnative/ios/modify_cj_file_for_ios.py --ignore-exception %%f -o %%f) --error-count-limit=all --diagnostic-format=json %%ohos_opt -O2 --static --static-std --target=x86_64-apple-ios17.5-simulator -B/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/ --sysroot=/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk --output-type=staticlib
	cmp_opt_frontend = --error-count-limit=all --diagnostic-format=json --target=x86_64-apple-ios17.5-simulator
	output = libcangjie_main.a
	suffix = out
	test_suffix = %%dylib_suffix
	middle = a
	null_path = /dev/null
	serial_compile = 
	close_apc_compile = --apc=1
	hle_c = export DYLD_LIBRARY_PATH=$CANGJIE_HOME/runtime/lib/darwin_aarch64_cjnative && $CANGJIE_HOME/tools/bin/hle -c -b $CANGJIE_HOME/tools/dtsparser/node_modules/.bin/cjbind
	hle_arkts = export DYLD_LIBRARY_PATH=$CANGJIE_HOME/runtime/lib/darwin_aarch64_cjnative && $CANGJIE_HOME/tools/bin/hle -r $CANGJIE_HOME/tools/dtsparser/node_modules/typescript -j $CANGJIE_HOME/tools/dtsparser/analysis.js
	cjcpl = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib && $CANGJIE_HOME/tools/bin/cjcpl
	old_cjo = --old
	new_cjo = --new
	cjfmt = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib && $CANGJIE_HOME/tools/bin/cjfmt
	lint = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib && $CANGJIE_HOME/tools/bin/cjlint
	cangjieDir = $CANGJIE_HOME
	cangjie-home = $CANGJIE_HOME
	cangjieStdxPath = $CANGJIE_STDX_PATH
	cjcov = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib && $CANGJIE_HOME/tools/bin/cjcov
	cjtrace_recover = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib && $CANGJIE_HOME/tools/bin/cjtrace-recover
	export = export
	source = source
	run = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib &&
	run_pkg = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib &&
	run_macro = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative:$CANGJIE_HOME/tools/lib &&
	run_stdx = 
	run_opt = 
	cangjie-stdx-list = -lstdx.unittest.data -lstdx.unittest -lstdx.encoding.json -lstdx.serialization.serialization -lstdx.serialization -lstdx.net.http -lstdx.net.tls -lstdx.net.tls.common -lstdx.net -lstdx.logger -lstdx.log -lstdx.encoding.url -lstdx.encoding.json.stream -lstdx.crypto.kit -lstdx.crypto.x509 -lstdx.crypto.crypto -lstdx.crypto.keys -lstdx.crypto.digest -lstdx.crypto.common -lstdx.encoding.hex -lstdx.encoding.base64 -lstdx.encoding -lstdx.compress.tar -lstdx.crypto -lstdx.compress.zlib -lstdx.compress -lstdx.actors
	run_args = 
	run_args_arg = 
	static_std = --static-std
	dy_std = --dy-std
	static_libs = --static-libs
	dy_libs = --dy-libs
	ldd = ldd
	main = main
	mod_opt = --module
	mod_name = --module-name module_name
	pkg_opt = --package
	compile_lib_opt = --output-type=staticlib
	extra_options = 
	compile_dylib_opt = --output-type=staticlib
	compile_chir_opt = --output-type=chir --experimental
	compile_dylib_opt_cjmp = mp.chir --common-part-cjo=mp.cjo --output-type=staticlib --experimental
	compile_lib_opt_cjmp = --common-part-chir=mp.chir --common-part-cjo=mp.cjo --output-type=staticlib --experimental
	link_cjmp = -L . -lmp
	cmp_stable_abi_dylib = -L. -lstable_abi
	enableConstPropagation = --fchir-constant-propagation
	incremental_compile = --incremental-compile --experimental
	overflow_wrapping = --int-overflow=wrapping
	conditional_compilation_config_opt = --cfg
	link-core = -lcangjie-std-core
	link_collection = 
	link-eh = -lstdx.effect --experimental --enable-eh
	stdx-package = -L $CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative
	cangjie-stdx-package = $CANGJIE_STDX_PATH
	stdx-library-path = -L $CANGJIE_STDX_PATH --import-path $CANGJIE_STDX_PATH
	import-cangjie-stdx = -L $CANGJIE_STDX_PATH -lstdx.chir -lstdx.unittest.data -lstdx.unittest -lstdx.encoding.json -lstdx.serialization.serialization -lstdx.serialization -lstdx.net.http -lstdx.net.tls -lstdx.net.tls.common -lstdx.net -lstdx.logger -lstdx.log -lstdx.encoding.url -lstdx.encoding.json.stream -lstdx.crypto.kit -lstdx.crypto.x509 -lstdx.crypto.crypto -lstdx.crypto.keys -lstdx.crypto.digest -lstdx.crypto.common -lstdx.encoding.hex -lstdx.encoding.base64 -lstdx.encoding -lstdx.compress.tar -lstdx.crypto -lstdx.compress.zlib -lstdx.compress -lstdx.actors -lstdx.syntax -lstdx.syntaxFFI -lstdx --import-path $CANGJIE_STDX_PATH -lc++
	cffi_output = lib%%n.%%cffi_suffix
	ffic_opt = -L . -l %%n %%n.cj
	pkg_compile = --output-type=staticlib -L . -l c_ffi
	pkg_link = -L . -l c_ffi -l pkg
	cffi_runtime_opt = 
	cffi_runtime_link = -I$CANGJIE_HOME/include -L $CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative/ -lcangjie-runtime --rtlib=compiler-rt %%cffi_std_link -ldl -fno-omit-frame-pointer -lboundscheck
	cffi_runtime_link_no_elfloader = -D__DSU__ -I$CANGJIE_HOME/include -L $CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative/ -lcangjie-runtime --rtlib=compiler-rt %%cffi_std_link -ldl -fno-omit-frame-pointer
	optimization_options = -O2
	debug_options = 
	sanitizer_options = 
	cffi_runtime_ld = --output-type=dylib -L . -l ffi%%n
	cffi_std_link = -lstdc++
	sanitizer_hwasan = --sanitize=hwaddress
	boundscheck = -I$CANGJIE_HOME/include -L $CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative/ -lboundscheck
	cffi_suffix = o
	set = 
	plugin_lsp_suffix = dylib
	chir-dis = chir-dis
	clang = clang
	gcc = gcc
	openssl_path = $OPENSSL_PATH
	c_compiler = clang
	clang_opt = -c --target=x86_64-apple-ios-simulator -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk
	ls = ls
	host_ls = ls
	host_cp = cp
	target_ls = 
	target_cp = 
	libdir = $CANGJIE_HOME/modules/ios_simulator_x86_64_cjnative/
	cat = cat
	mv = mv
	rm = rm
	cp = cp
	touch = touch
	diff = diff
	grep = grep
	sed = sed
	sed_opt = -i ""
	chmod = chmod
	pwd = $(pwd)
	mkdir = mkdir
	rmdir = rm -rf
	use_ast = 
	use_pic_ast = 
	pic_opt = 
	macro_lib_opt = 
	append_opt = 
	append_pic_opt = 
	append_macro_lib_opt = 
	macro_debug = --debug-macro
	enable_macro = 
	cmp_macro = --error-count-limit=all --diagnostic-format=json --compile-macro
	macro_lib = 
	macro_opt = --output-type=dylib
	run_macro_opt = 
	cjpm_opt = --target=x86_64-apple-ios17.5-simulator
	cjpm = export DYLD_LIBRARY_PATH=/opt/homebrew/opt/openssl@3/lib:/opt/homebrew/opt/libffi/lib/:$DYLD_LIBRARY_PATH && cjpm
	cpm_bin_path = ./build/bin
	python = python3
	dump = -frontend --dump-parse
	closebuf = stdbuf -o0 -e0
	export_expand = export PATH=$(pwd):$PATH
	object_file_suffix = o
	git_dir_prefix = export DYLD_LIBRARY_PATH=/opt/homebrew/opt/openssl@3/lib:/opt/homebrew/opt/libffi/lib/:$DYLD_LIBRARY_PATH GIT_DIR=
	git_dir_suffix = 
	obf_string = --fobf-string
	no_obf_string = --fno-obf-string
	obf_const = --fobf-const
	no_obf_const = --fno-obf-const
	obf_layout = --fobf-layout
	no_obf_layout = --fno-obf-layout
	obf_cf_flatten = --fobf-cf-flatten
	no_obf_cf_flatten = --fno-obf-cf-flatten
	obf_cf_bogus = --fobf-cf-bogus
	no_obf_cf_bogus = --fno-obf-cf-bogus
	obf_export = --fobf-export-symbols
	prebuilt-toolchain = 
	no_obf_export = --fno-obf-export-symbols
	obf_sym_input = --obf-sym-input-mapping
	obf_sym_output = --obf-sym-output-mapping
	obf_apply_mapping = --obf-apply-mapping-file
	obf_sym_prefix = --obf-sym-prefix
	obf_source_path = --fobf-source-path
	no_obf_source_path = --fno-obf-source-path
	obf_line_number = --fobf-line-number
	no_obf_line_number = --fno-obf-line-number
	obf_all = --fobf-all
	save_temps = --save-temps=.
	disassembler = LD_LIBRARY_PATH=$CANGJIE_HOME/third_party/llvm/lib:$LD_LIBRARY_PATH $CANGJIE_HOME/third_party/llvm/bin/llvm-dis
	cmp_output = 
	compilation_options = --error-count-limit=all --diagnostic-format=json %%ohos_opt
	linkage_options = --static --static-std
	dylib_suffix = a
	cmp_utest_opt = --test
	shell = $SHELL
	run_utest_opt = 
	utest_no_progress = 
	java = java
	compile_executable = --output-type=exe
	javac = javac -encoding UTF-8
	java_mirror_gen = -Dpackage.mode=true -jar $CANGJIE_HOME/tools/bin/java-mirror-gen.jar -d . -cp .
	java_interop_template = $CANGJIE_TEST/testsuites/HLT/configs/cjnative/android/MyApplication
	java_interop_util = $CANGJIE_TEST/testsuites/HLT/compiler/cjnative/FFI/jffi/android/util
	java_interop_runner = $CANGJIE_TEST/testsuites/HLT/configs/cjnative/android/run.py
	java_interop_setup = $CANGJIE_TEST/testsuites/HLT/configs/cjnative/android/setup.py
	cp_loader_jar = -cp .:$CANGJIE_HOME/lib/library-loader.jar
	jffi_link = -L . -linteroplib.interop -ljava.lang
	cangjie-repo-token = $CANGJIE_REPO_TOKEN
	repo_sed = sed -i ''
	host_dylib_suffix = dylib
	cangjie-stdx-path = $CANGJIE_STDX_PATH/../..
	cangjie-static-stdx-path = $CANGJIE_STDX_PATH/../../static/stdx
	cangjie-dynamic-stdx-path = $CANGJIE_STDX_PATH/../../dynamic/stdx
	check-dylib-dep = otool -L
	cangjie_runtime_link = -I$CANGJIE_HOME/include -L$CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative -rpath $CANGJIE_HOME/runtime/lib/ios_simulator_x86_64_cjnative -lcangjie-runtime
	link_oc = -linteroplib.objc -lobjc.lang --link-options "-framework Foundation"
	host = darwin_aarch64_cjnative
	target = ios_simulator_x86_64_cjnative
	java_home = ${JAVA_HOME}
	ohos_opt = 
	ohos_opt_pc = 
	clang_opt_objc = -fmodules -fobjc-arc -I$CANGJIE_HOME/include -L$CANGJIE_HOME/runtime/lib/darwin_aarch64_cjnative -lcangjie-runtime
	cmp_ocffi_opt = --error-count-limit 3 -Woff all
	mirror_gen = ObjCInteropGen --mode=normal
	ins_nm_cjworld = --link-options="-install_name @rpath/libcjworld.dylib"
	mirror_opt = --generate-definitions
	enable_objc_cjmapping = --experimental --enable-interop-cjmapping=ObjC
	run_env = ios_simulator_x86_64_cjnative
	interop_config = --experimental --import-interop-cj-package-config-path
	compile_library = --output-type=staticlib
	library_suffix = a
	host_library_suffix = a
	host_triple = aarch64-apple-darwin
	target_triple = x86_64-apple-ios17.5-simulator
