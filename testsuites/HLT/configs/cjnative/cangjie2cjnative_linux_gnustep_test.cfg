[root]
  path = ../../
[suffix]
  info = //
[inherit]
  inherit=./cangjie2cjnative_linux_x86_test.cfg
[condition]
condition =
  CJNATIVE
  x86
  Linux
  Unix
[internal-var]
  mirror_gen = ObjCInteropGen --mode=normal
  mirror_opt = --generate-definitions
  clang = clang $(gnustep-config --objc-flags) $(gnustep-config --base-libs)
  clang_link_core = -lgnustep-corebase
[description]
  title = cangjie2cjnative_linux_gnustep_test
[env]
  LD_LIBRARY_PATH=./:$LD_LIBRARY_PATH
