[root]
  path = ../../
[suffix]
  cj = //
  info = //
[inherit]
  inherit=./common.cfg
[env]
  CANGJIE_DYLD_PATH=/opt/homebrew/opt/openssl@3/lib:/opt/homebrew/opt/libffi/lib/
[condition]
  condition = never
[internal-var]
  cangjie-home = $CANGJIE_HOME
  mkdir = mkdir -p
  rmdir = rm -rf
  
  # dylib suffix on host machine.
  host_dylib_suffix = dylib
  readelf = llvm-readelf
  
  # hle
  hle_c = export DYLD_LIBRARY_PATH=$CANGJIE_HOME/runtime/lib/%%host && $CANGJIE_HOME/tools/bin/hle -c -b $CANGJIE_HOME/tools/dtsparser/node_modules/.bin/cjbind
  hle_arkts = export DYLD_LIBRARY_PATH=$CANGJIE_HOME/runtime/lib/%%host && $CANGJIE_HOME/tools/bin/hle -r $CANGJIE_HOME/tools/dtsparser/node_modules/typescript -j $CANGJIE_HOME/tools/dtsparser/analysis.js

  # cjcpl
  cjcpl = %%run_macro $CANGJIE_HOME/tools/bin/cjcpl

  # cjfmt
  cjfmt = %%run_macro $CANGJIE_HOME/tools/bin/cjfmt

  # cjlint
  lint = %%run_macro $CANGJIE_HOME/tools/bin/cjlint

  # cjcov
  cjcov = %%run_macro $CANGJIE_HOME/tools/bin/cjcov

  # cjtrace-recover
  cjtrace_recover = %%run_macro export DYLD_LIBRARY_PATH=$CANGJIE_HOME/runtime/lib/%%host && $CANGJIE_HOME/tools/bin/cjtrace-recover
  openssl_path = $OPENSSL_PATH

  # cjpm
  cjpm = export DYLD_LIBRARY_PATH=$CANGJIE_DYLD_PATH:$DYLD_LIBRARY_PATH && cjpm
  git_dir_prefix = export DYLD_LIBRARY_PATH=$CANGJIE_DYLD_PATH:$DYLD_LIBRARY_PATH GIT_DIR=
  cangjie-repo-token=$CANGJIE_REPO_TOKEN
  repo_sed = sed -i ''

  compiler = %%run_macro cjc --set-runtime-rpath
  dylib_suffix = dylib
  run = %%run_macro
  run_pkg = %%run_macro
  run_macro = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_HOME/runtime/lib/%%run_env:$CANGJIE_HOME/tools/lib &&
  run_stdx = export DYLD_LIBRARY_PATH=$(pwd):$CANGJIE_DYLD_PATH:$CANGJIE_STDX_PATH:$CANGJIE_HOME/runtime/lib/%%run_env:$CANGJIE_HOME/tools/lib:$DYLD_LIBRARY_PATH &&
  host = darwin_x86_64_cjnative
  sed_opt = -i ""
  clang_opt = -shared -fPIC -Wl,-undefined,suppress,-flat_namespace
  serial_compile =
  plugin_lsp_suffix = dylib

  # cjmp ObjectiveC
  cangjie_runtime_link = -I${CANGJIE_HOME}/include -L$CANGJIE_HOME/runtime/lib/%%run_env -rpath $CANGJIE_HOME/runtime/lib/%%run_env -lcangjie-runtime
  link_oc = -linteroplib.objc -lobjc.lang --link-options "-framework Foundation"

  run_env = darwin_x86_64_cjnative
  cangjie-stdx-path=$CANGJIE_STDX_PATH/../..
  cangjie-static-stdx-path=$CANGJIE_STDX_PATH/../../static/stdx
  cangjie-dynamic-stdx-path=$CANGJIE_STDX_PATH/../../dynamic/stdx
  check-dylib-dep = otool -L

  dypath-cwd = export DYLD_LIBRARY_PATH=$(pwd):$DYLD_LIBRARY_PATH &&
  dypath-cangjie-dynamic-stdx-path = export DYLD_LIBRARY_PATH=$CANGJIE_STDX_PATH/../../dynamic/stdx:$DYLD_LIBRARY_PATH && 

[description]
  title = Cangjie2cjnative MAC Test
