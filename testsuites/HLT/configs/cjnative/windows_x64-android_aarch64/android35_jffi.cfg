[description]
	title = x86_64-w64-mingw32->aarch64-linux-android35,O2
[root]
	path = ../../../
[suffix]
	cj = //
	info = //
[run]
	script = bash %%CANGJIE_TEST%%/testsuites/HLT/configs/cjnative/android/run_android_jffi.bat linux_android_aarch64_cjnative aarch64-linux-android | ignore_cmd_redirect
	pass_redirect = true
[env]
	LD_LIBRARY_PATH=./:$LD_LIBRARY_PATH
[condition]
	condition =
		cross_compilation
		Windows
		host_win
		x86
		host_x86_64
		target_android
		arm
		target_aarch64
		Android
		O2
		CJNATIVE
[internal-var]
	cangjie_test = %%CANGJIE_TEST%%
	compiler = cjc
	compiler_frontend = cjc-frontend
	cmp_opt = --error-count-limit=all --diagnostic-format=json %%ohos_opt -O2
	cmp_opt_frontend = -O2 --error-count-limit=all --diagnostic-format=json %%ohos_opt_pc
	output = %%n.%%suffix
	suffix = exe
	test_suffix = dll
	middle = a
	null_path = NUL
	serial_compile = 
	close_apc_compile = --apc=1
	hle_c = %%CANGJIE_HOME%%/tools/bin/hle -c -b %%CANGJIE_HOME%%/tools/dtsparser/node_modules/.bin/cjbind.exe
	hle_arkts = %%CANGJIE_HOME%%/tools/bin/hle -r %%CANGJIE_HOME%%/tools/dtsparser/node_modules/typescript -j %%CANGJIE_HOME%%/tools/dtsparser/analysis.js
	cjcpl = %%CANGJIE_HOME%%/tools/bin/cjcpl
	old_cjo = --old
	new_cjo = --new
	cjfmt = %%CANGJIE_HOME%%/tools/bin/cjfmt
	lint = %%CANGJIE_HOME%%/tools/bin/cjlint
	cangjieDir = %%CANGJIE_HOME%%
	cangjie-home = %%CANGJIE_HOME%%
	cangjieStdxPath = %%CANGJIE_STDX_PATH%%
	cjcov = %%CANGJIE_HOME%%/tools/bin/cjcov
	cjtrace_recover = %%CANGJIE_HOME%%/tools/bin/cjtrace-recover
	export = set
	source = sh
	run = export LD_LIBRARY_PATH=$(pwd):/data/local/tmp/linux_android_aarch64_cjnative:$LD_LIBRARY_PATH &&
	run_pkg = export LD_LIBRARY_PATH=$(pwd):/data/local/tmp/linux_android_aarch64_cjnative:$LD_LIBRARY_PATH &&
	run_macro = set LD_LIBRARY_PATH=%%chdir%%:%%LD_LIBRARY_PATH%% && 
	run_stdx = export LD_LIBRARY_PATH=$(pwd):/data/local/tmp/linux_android_aarch64_cjnative:$LD_LIBRARY_PATH &&
	run_opt = 
	cangjie-stdx-list = -lstdx.unittest.data -lstdx.unittest -lstdx.encoding.json -lstdx.serialization.serialization -lstdx.serialization -lstdx.net.http -lstdx.net.tls -lstdx.net.tls.common -lstdx.net -lstdx.logger -lstdx.log -lstdx.encoding.url -lstdx.encoding.json.stream -lstdx.crypto.kit -lstdx.crypto.x509 -lstdx.crypto.crypto -lstdx.crypto.keys -lstdx.crypto.digest -lstdx.crypto.common -lstdx.encoding.hex -lstdx.encoding.base64 -lstdx.encoding -lstdx.compress.tar -lstdx.crypto -lstdx.compress.zlib -lstdx.compress -lstdx.actors
	run_args = 
	run_args_arg = 
	static_std = --static-std
	dy_std = --dy-std
	static_libs = --static-libs
	dy_libs = --dy-libs
	ldd = ldd
	main = main
	mod_opt = --module
	mod_name = --module-name module_name
	pkg_opt = --package
	compile_lib_opt = --output-type=staticlib
	extra_options = 
	compile_dylib_opt = --output-type=dylib
	compile_chir_opt = --output-type=chir --experimental
	compile_dylib_opt_cjmp = --common-part-chir=mp.chir --common-part-cjo=mp.cjo --output-type=dylib --experimental
	compile_lib_opt_cjmp = --common-part-chir=mp.chir --common-part-cjo=mp.cjo --output-type=staticlib --experimental
	link_cjmp = -L . -lmp
	cmp_stable_abi_dylib = -L. -lstable_abi
	enableConstPropagation = --fchir-constant-propagation
	incremental_compile = --incremental-compile --experimental
	overflow_wrapping = --int-overflow=wrapping
	conditional_compilation_config_opt = --cfg
	link-core = -lcangjie-std-core
	link_collection = 
	link-eh = -lstdx.effect --experimental --enable-eh
	stdx-package = -L %%CANGJIE_HOME%%/runtime/lib/linux_android_aarch64_cjnative
	cangjie-stdx-package = %%CANGJIE_STDX_PATH%%
	stdx-library-path = -L %%CANGJIE_STDX_PATH%% --import-path %%CANGJIE_STDX_PATH%%
	import-cangjie-stdx = --import-path %%CANGJIE_LOCAL_STDX_PATH%% -L %%CANGJIE_STDX_PATH%% -lstdx.chir -lstdx.unittest.data -lstdx.unittest -lstdx.encoding.json -lstdx.serialization.serialization -lstdx.serialization -lstdx.net.http -lstdx.net.tls -lstdx.net.tls.common -lstdx.net -lstdx.logger -lstdx.log -lstdx.encoding.url -lstdx.encoding.json.stream -lstdx.crypto.kit -lstdx.crypto.x509 -lstdx.crypto.crypto -lstdx.crypto.keys -lstdx.crypto.digest -lstdx.crypto.common -lstdx.encoding.hex -lstdx.encoding.base64 -lstdx.encoding -lstdx.compress.tar -lstdx.crypto -lstdx.compress.zlib -lstdx.compress -lstdx.actors -lstdx.syntax -lstdx.syntaxFFI -lstdx --import-path %%CANGJIE_STDX_PATH%%
	cffi_output = lib%%n.%%cffi_suffix --target=x86_64-windows-gnu
	ffic_opt = -L . -l %%n %%n.cj
	pkg_compile = --output-type=dylib -L . -l c_ffi
	pkg_link = -L . -l c_ffi -l pkg
	cffi_runtime_opt = 
	cffi_runtime_link = -D__DSU__ -I%%CANGJIE_HOME%%/include -L %%CANGJIE_HOME%%/runtime/lib/linux_android_aarch64_cjnative/ -lcangjie-runtime -lcangjie-elfloader --rtlib=compiler-rt -lstdc++ -ldl -fno-omit-frame-pointer -lsecurec
	cffi_runtime_link_no_elfloader = -D__DSU__ -I%%CANGJIE_HOME%%/include -L %%CANGJIE_HOME%%/runtime/lib/linux_android_aarch64_cjnative/ -lcangjie-runtime --rtlib=compiler-rt -lstdc++ -ldl -fno-omit-frame-pointer
	optimization_options = -O2
	debug_options = 
	sanitizer_options = 
	cffi_runtime_ld = --output-type=dylib -L . -l ffi%%n
	cffi_std_link = -lstdc++
	sanitizer_hwasan = --sanitize=hwaddress
	boundscheck = -I%%CANGJIE_HOME%%/include -L %%CANGJIE_HOME%%/runtime/lib/linux_android_aarch64_cjnative/ -lboundscheck
	cffi_suffix = %%dylib_suffix
	set = set
	plugin_lsp_suffix = dll.a
	chir-dis = chir-dis
	clang = %%OHOS_ROOT%%/llvm/prebuilt/windows-x86_64/bin/clang
	gcc = gcc
	openssl_path = %%OPENSSL_PATH%%
	c_compiler = clang
	clang_opt = -shared -fPIC --target=aarch64-linux-android35 --sysroot=%%OHOS_ROOT%%/llvm/prebuilt/windows-x86_64/sysroot
	ls = dir
	host_ls = dir
	host_cp = copy
	target_ls = ls
	target_cp = cp
	libdir = %%CANGJIE_HOME%%/modules/linux_android_aarch64_cjnative/
	cat = type
	mv = move
	rm = del
	cp = copy
	touch = touch
	diff = diff
	grep = findstr
	sed = sed
	sed_opt = -i
	chmod = %%chmod%%
	pwd = %%cd%%
	mkdir = md
	rmdir = rd /s /q
	use_ast = 
	use_pic_ast = 
	pic_opt = 
	macro_lib_opt = 
	append_opt = 
	append_pic_opt = 
	append_macro_lib_opt = 
	macro_debug = --debug-macro
	enable_macro = 
	cmp_macro = -O2 --error-count-limit=all --diagnostic-format=json --compile-macro
	macro_lib = 
	macro_opt = --output-type=dylib
	run_macro_opt = 
	cjpm_opt = --target=aarch64-linux-android35
	cjpm = cjpm
	cpm_bin_path = ./build/bin
	python = python3
	dump = -frontend --dump-parse
	closebuf = stdbuf -o0 -e0
	export_expand = export PATH=$(pwd):$PATH
	object_file_suffix = obj
	git_dir_prefix = set GIT_DIR=
	git_dir_suffix = &&
	obf_string = --fobf-string
	no_obf_string = --fno-obf-string
	obf_const = --fobf-const
	no_obf_const = --fno-obf-const
	obf_layout = --fobf-layout
	no_obf_layout = --fno-obf-layout
	obf_cf_flatten = --fobf-cf-flatten
	no_obf_cf_flatten = --fno-obf-cf-flatten
	obf_cf_bogus = --fobf-cf-bogus
	no_obf_cf_bogus = --fno-obf-cf-bogus
	obf_export = --fobf-export-symbols
	prebuilt-toolchain = %%OHOS_ROOT%%/llvm/prebuilt/windows-x86_64
	no_obf_export = --fno-obf-export-symbols
	obf_sym_input = --obf-sym-input-mapping
	obf_sym_output = --obf-sym-output-mapping
	obf_apply_mapping = --obf-apply-mapping-file
	obf_sym_prefix = --obf-sym-prefix
	obf_source_path = --fobf-source-path
	no_obf_source_path = --fno-obf-source-path
	obf_line_number = --fobf-line-number
	no_obf_line_number = --fno-obf-line-number
	obf_all = --fobf-all
	save_temps = --save-temps=.
	disassembler = set LD_LIBRARY_PATH=%%CANGJIE_HOME%%/third_party/llvm/lib:%%LD_LIBRARY_PATH%% && %%CANGJIE_HOME%%/third_party/llvm/bin/llvm-dis
	cmp_output = 
	compilation_options = --error-count-limit=all --diagnostic-format=json %%ohos_opt
	linkage_options = 
	dylib_suffix = dll
	cmp_utest_opt = --test
	shell = $SHELL
	run_utest_opt = %%utest_no_progress
	utest_no_progress = --no-progress
	java = java
	compile_executable = --output-type=exe
	javac = javac -encoding UTF-8
	java_mirror_gen = -Dpackage.mode=true -jar %%CANGJIE_HOME%%/tools/bin/java-mirror-gen.jar -d . -cp .
	java_interop_template = %%CANGJIE_TEST%%/testsuites/HLT/configs/cjnative/android/MyApplication
	java_interop_util = %%CANGJIE_TEST%%/testsuites/HLT/compiler/cjnative/FFI/jffi/android/util
	java_interop_runner = %%CANGJIE_TEST%%/testsuites/HLT/configs/cjnative/android/run.py
	java_interop_setup = %%CANGJIE_TEST%%/testsuites/HLT/configs/cjnative/android/setup.py
	cp_loader_jar = -cp .:%%CANGJIE_HOME%%/lib/library-loader.jar
	jffi_link = -L . -linteroplib.interop -lcinteroplib -ljava.lang
	cangjie-repo-token = %%CANGJIE_REPO_TOKEN%%
	repo_sed = sed -i
	host_dylib_suffix = dll
	cangjie-stdx-path = %%CANGJIE_STDX_PATH%%/../..
	cangjie-static-stdx-path = %%CANGJIE_STDX_PATH%%/../../static/stdx
	cangjie-dynamic-stdx-path = %%CANGJIE_STDX_PATH%%/../../dynamic/stdx
	check-dylib-dep = %%OHOS_ROOT%%/llvm/prebuilt/windows-x86_64/bin/llvm-readelf -d
	cangjie_runtime_link = 
	link_oc = 
	host = windows_x86_64_cjnative
	target = linux_android_aarch64_cjnative
	java_home = %%JAVA_HOME%%
	ohos_opt = --target=aarch64-linux-android35 -B=%%OHOS_ROOT%%/llvm/prebuilt/windows-x86_64/bin --sysroot=%%OHOS_ROOT%%/llvm/prebuilt/windows-x86_64/sysroot
	ohos_opt_pc = --target=aarch64-linux-android35
	clang_opt_objc = -fmodules -fobjc-arc -I%%CANGJIE_HOME%%/include -L%%CANGJIE_HOME%%/runtime/lib/darwin_aarch64_cjnative -lcangjie-runtime
	cmp_ocffi_opt = --error-count-limit 3 -Woff all
	mirror_gen = ObjCInteropGen --mode=normal
	ins_nm_cjworld = --link-options="-install_name @rpath/libcjworld.dylib"
	mirror_opt = --generate-definitions
	enable_objc_cjmapping = --experimental --enable-interop-cjmapping=ObjC
	run_env = linux_android_aarch64_cjnative
	interop_config = --experimental --import-interop-cj-package-config-path
	compile_library = --output-type=dylib
	library_suffix = dll
	host_library_suffix = dll
	host_triple = x86_64-w64-mingw32
	target_triple = aarch64-linux-android35
