[dependencies]

[package]
  cjc-version = "1.0.0"
  compile-option = ""
  description = "nothing here"
  link-option = ""
  name = "b"
  output-type = "executable"
  override-compile-option = ""
  version = "1.0.0"

[profile]
build = { lto = "full", combined = { b = "dynamic" }}

[package.package-configuration.b]
combine-all-deps = true

[target.x86_64-unknown-linux-gnu.bin-dependencies]
  path-option = ["p3/target/release/p3"]

[target.aarch64-unknown-linux-gnu.bin-dependencies]
  path-option = ["p3/target/release/p3"]

[target.aarch64-linux-ohos.bin-dependencies]
  path-option = ["p3/target/aarch64-linux-ohos/release/p3"]

[target.x86_64-linux-ohos.bin-dependencies]
  path-option = ["p3/target/x86_64-linux-ohos/release/p3"]

[target.aarch64-linux-android26.bin-dependencies]
  path-option = ["p3/target/aarch64-linux-android26/release/p3"]

[target.aarch64-linux-android31.bin-dependencies]
  path-option = ["p3/target/aarch64-linux-android31/release/p3"]

[target.aarch64-linux-android32.bin-dependencies]
  path-option = ["p3/target/aarch64-linux-android32/release/p3"]

[target.aarch64-linux-android35.bin-dependencies]
  path-option = ["p3/target/aarch64-linux-android35/release/p3"]

[target.x86_64-linux-ohos]
  compile-option = "-B=${OHOS_ROOT}/llvm/prebuilt/x86_64-linux-ohos/bin --sysroot=${OHOS_ROOT}/llvm/prebuilt/x86_64-linux-ohos/sysroot"

[target.aarch64-linux-ohos]
  compile-option = "-B${OHOS_ROOT}/sysroot/usr/lib/aarch64-linux-ohos -B${OHOS_ROOT}/llvm/bin -L${OHOS_ROOT}/llvm/lib/clang/15.0.4/lib/aarch64-linux-ohos -L${OHOS_ROOT}/llvm/lib/aarch64-linux-ohos -L${OHOS_ROOT}/sysroot/usr/lib/aarch64-linux-ohos"
	

[target.aarch64-linux-android26]
  compile-option = "-B=${NDK_ROOT}/bin --sysroot=${NDK_ROOT}/sysroot"
[target.aarch64-linux-android31]
  compile-option = "-B=${NDK_ROOT}/bin --sysroot=${NDK_ROOT}/sysroot"
[target.aarch64-linux-android32]
  compile-option = "-B=${NDK_ROOT}/bin --sysroot=${NDK_ROOT}/sysroot"
[target.aarch64-linux-android35]
  compile-option = "-B=${NDK_ROOT}/bin --sysroot=${NDK_ROOT}/sysroot"

[target.arm-linux-android23]
  compile-option = "-B=${NDK_ROOT}/bin --sysroot=${NDK_ROOT}/sysroot"