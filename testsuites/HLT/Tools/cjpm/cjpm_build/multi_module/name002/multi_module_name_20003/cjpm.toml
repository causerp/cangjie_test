[dependencies]
  b = {path = "./b"}

[package]
  cjc-version = "0.25.1"
  compile-option = ""
  description = "nothing here"
  link-option = ""
  name = "a"
  output-type = "executable"
  src-dir = "src"
  target-dir = ""
  version = "1.0.0"
  package-configuration = {}

[target]
  aarch64-hm-gnu = {compile-option = "-B/opt/RTOS_V2X/301.1.0/arm64le_hm_pro/bin -B/opt/RTOS_V2X/301.1.0/arm64le_hm_pro/sdk/usr/lib -L/opt/RTOS_V2X/301.1.0/arm64le_hm_pro/gnu64/aarch64-hongmeng-musl/lib64"}
[target.x86_64-linux-ohos]
  compile-option = "-B=${OHOS_ROOT}/llvm/prebuilt/x86_64-linux-ohos/bin --sysroot=${OHOS_ROOT}/llvm/prebuilt/x86_64-linux-ohos/sysroot"

[target.aarch64-linux-ohos]
  compile-option = "-B${OHOS_ROOT}/out/generic_generic_arm_64only/hisi_all_phone_standard/obj/third_party/musl/usr/lib/aarch64-linux-ohos -B${OHOS_ROOT}/prebuilts/clang/ohos/windows-x86_64/llvm/bin -L${OHOS_ROOT}/prebuilts/clang/ohos/windows-x86_64/llvm/lib/clang/15.0.4/lib/aarch64-linux-ohos -L${OHOS_ROOT}/prebuilts/clang/ohos/windows-x86_64/llvm/lib/aarch64-linux-ohos -L${OHOS_ROOT}/out/generic_generic_arm_64only/hisi_all_phone_standard/obj/third_party/musl/usr/lib/aarch64-linux-ohos -L${OHOS_ROOT}/out/generic_generic_arm_64only/hisi_all_phone_standard/thirdparty/openssl"
	

[target.aarch64-linux-android26]
  compile-option = "-B=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/bin --sysroot=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/sysroot"
[target.aarch64-linux-android31]
  compile-option = "-B=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/bin --sysroot=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/sysroot"
[target.aarch64-linux-android32]
  compile-option = "-B=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/bin --sysroot=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/sysroot"
[target.aarch64-linux-android35]
  compile-option = "-B=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/bin --sysroot=${OHOS_ROOT}/llvm/prebuilt/darwin-arm64/sysroot"